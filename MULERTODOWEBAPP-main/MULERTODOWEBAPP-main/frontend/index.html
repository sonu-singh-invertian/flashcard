<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>
        
        <form id="taskForm" class="card">
            <input type="text" id="title" placeholder="What needs to be done?" required>
            <div class="file-upload">
                <label for="thumbnail">📸 Add Thumbnail (Optional)</label>
                <input type="file" id="thumbnail" name="thumbnail" accept="image/*">
            </div>
            <button type="submit">Add Task</button>
        </form>

        <div id="taskList" class="task-grid"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
